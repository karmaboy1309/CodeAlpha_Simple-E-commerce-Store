<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleStore - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">SimpleStore.</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="cart.html">Cart <span class="cart-count">0</span></a>
            </div>
        </nav>
    </header>

    <div class="form-container">
        <h2 class="form-title">Create an Account</h2>
        <div id="register-alert" class="alert"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
        </form>
        <div class="form-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('register-alert');

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();

                if (response.ok) {
                    alertBox.textContent = "Registration successful! Redirecting to login...";
                    alertBox.className = "alert alert-success";
                    alertBox.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alertBox.textContent = data.error;
                    alertBox.className = "alert alert-error";
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                alertBox.textContent = "Network error. Please try again.";
                alertBox.className = "alert alert-error";
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
